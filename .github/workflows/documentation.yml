name: Documentation

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check-out repo
        uses: actions/checkout@v4
      - name: Generate redirect stubs for the old documentation pages
        run: |
          DOCS=https://docs.kinegram.digital/mobile-chip-sdk/online/emrtd-connector/ios
          REFERENCE=https://docs.kinegram.digital/reference/emrtd-connector-ios/latest
          mkdir -p _site/documentation/kinegramemrtdconnector
          stub() {
            cat <<EOF >"_site/$1.html"
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <title>Moved to docs.kinegram.digital</title>
          <meta name="robots" content="noindex">
          <meta http-equiv="refresh" content="0; url=$2">
          <link rel="canonical" href="$2">
          <link rel="icon" href="favicon.svg">
          </head>
          <body>
          <p>This page has moved to <a href="$2">$2</a>.</p>
          </body>
          </html>
          EOF
          }
          stub index "$DOCS/"
          stub CHANGELOG "$DOCS/changelog"
          stub MIGRATION_V1_TO_V2 "$DOCS/migration-v1-to-v2"
          stub documentation/kinegramemrtdconnector/index "$REFERENCE/documentation/kinegramemrtdconnector/"
      - name: Copy favicon to directory "_site"
        run: cp favicon.svg _site/
      - name: Upload artifact for Github pages
        uses: actions/upload-pages-artifact@v3
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
